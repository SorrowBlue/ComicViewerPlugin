name: Build
on:
  workflow_call:

jobs:

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK and Gradle
        uses: ./.github/actions/setup-java-gradle
      - name: Run :pdf:androidApp:bundleRelease
        run: ./gradlew :pdf:androidApp:assembleRelease
      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: androidApp-release.apk
          path: pdf/androidApp/build/outputs/apk/release/androidApp-release.apk

  build-desktop:
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup JDK and Gradle
        uses: ./.github/actions/setup-java-gradle
      - name: Run :pdf:desktopApp:packageDistributionForCurrentOS
        run: ./gradlew :pdf:desktopApp:packageDistributionForCurrentOS
      - name: Upload Desktop Binaries
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ runner.os }}
          path: pdf/desktopApp/ComicViewerPDF/main

  check-build:
    name: All Build Passed
    runs-on: ubuntu-latest
    needs: [ build-android, build-desktop ]
    steps:
      - name: Confirm All Build Jobs Succeeded
        run: echo "✅ All build jobs (Android, Windows, macOS, Linux) completed successfully."
