name: Static Code Analysis
on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:

  detekt:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        task: [ 'reportMerge --continue', ':build-logic:detektMain' ]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup JDK and Gradle
        uses: ./.github/actions/setup-java-gradle
      - name: 🔍️Run detekt
        run: ./gradlew ${{ matrix.task }}
      - name: Upload Detekt SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: ${{ !cancelled() && matrix.task != ':build-logic:detektMain' }}
        with:
          sarif_file: build/reports/detekt/merge.sarif
          category: detekt
      - name: Upload Detekt SARIF(build-logic)
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4
        if: ${{ !cancelled() && matrix.task == ':build-logic:detektMain' }}
        with:
          sarif_file: build-logic/build/reports/detekt/main.sarif
          category: detekt

  checkVersionCatalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup JDK and Gradle
        uses: ./.github/actions/setup-java-gradle
      - name: Run check VersionCatalog
        run: ./gradlew checkVersionCatalog

  static-code-analysis-aggregate:
    name: All Static Code Analysis Checks Passed
    runs-on: ubuntu-latest
    needs: [ detekt, checkVersionCatalog ]
    steps:
      - name: Confirm All Static Code Analysis Jobs Succeeded
        run: echo "✅ All static code analysis jobs succeeded!"
