name: Production Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (format: v.X.Y.Z)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write
  pull-requests: read
  security-events: write

concurrency:
  group: production-release-${{ github.event.inputs.tag_name }}
  cancel-in-progress: false

jobs:
  input-check:
    runs-on: ubuntu-latest
    outputs:
      validated_tag: ${{ github.event.inputs.tag_name }}
    steps:
      - name: Check Tag Format and Range
        id: check
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          # X: 0-255
          X_RE="([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])"
          # Y, Z: 0-65535
          YZ_RE="([0-9]{1,4}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])"
          FULL_RE="^v${X_RE}\.${YZ_RE}\.${YZ_RE}$"
          if [[ $TAG =~ $FULL_RE ]]; then
            echo "Validation Passed: $TAG"
          else
            echo "::error title=Invalid Tag::Tag '$TAG' does not match format vX.Y.Z (X:0-255, Y/Z:0-65535)"
            exit 1
          fi

  lint:
    needs: input-check
    uses: SorrowBlue/github-actions/.github/workflows/analyze-matrix.yml@main
    with:
      matrix-json: .github/lint-matrix.json

  conveyor-build:
    needs: [ lint, input-check ]
    uses: SorrowBlue/github-actions/.github/workflows/conveyor-build.yml@main
    secrets: inherit
    with:
      matrix-json: .github/conveyor-build-matrix.json
      override-tag: ${{ needs.input-check.outputs.validated_tag }}
      task: :pdf:desktopApp:jvmJar :pdf:desktopApp:printConveyorConfig :pdf:desktopApp:writeConveyorConfig :pdf:desktopApp:copyConveyorInputs
      environment: conveyor

  conveyor-build-after:
    needs: conveyor-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Download Conveyor output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: conveyor-output
          path: output
      - name: Prepare gh-pages source bundle
        run: |
          set -euo pipefail
          mkdir gh-pages-source
          cp -r docs/. gh-pages-source/
          mv output/download.html gh-pages-source/
          mv output/icon.svg gh-pages-source/
          tar -cvf gh-pages-source.tar gh-pages-source/
      - name: Upload conveyor artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gh-pages-source
          path: gh-pages-source.tar
      - name: Upload conveyor artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: conveyor-output
          path: output/*

  draft-release:
    needs: [ input-check, conveyor-build-after ]
    runs-on: ubuntu-latest
    steps:
      - name: Update draft release metadata
        uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        with:
          config-name: release-drafter.yml
          tag: ${{ needs.input-check.outputs.validated_tag }}
      - name: Download Desktop artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: conveyor-output
          path: release-assets
      - name: Download gh-pages source artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: gh-pages-source
          path: release-assets
      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.input-check.outputs.validated_tag }}
          draft: true
          files: release-assets/*
          overwrite_files: true

  create-release:
    needs: [ input-check, draft-release ]
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release and tag
        uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        with:
          config-name: release-drafter.yml
          publish: true
          tag: ${{ needs.input-check.outputs.validated_tag }}
          token: ${{ secrets.RELEASE_DRAFTER_PUBLISH }}
