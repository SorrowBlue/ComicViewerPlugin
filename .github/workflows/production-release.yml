name: Production Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag (format: v.X.Y.Z)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write
  pull-requests: read
  security-events: write

concurrency:
  group: production-release-${{ github.event.inputs.tag_name }}
  cancel-in-progress: false

jobs:
  input-check:
    runs-on: ubuntu-latest
    outputs:
      validated_tag: ${{ github.event.inputs.tag_name }}
    steps:
      - name: Check Tag Format and Range
        id: check
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          # X: 0-255
          X_RE="([0-9]|[1-9][0-9]|1[0-9]{2}|2[0-4][0-9]|25[0-5])"
          # Y, Z: 0-65535
          YZ_RE="([0-9]{1,4}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])"
          FULL_RE="^v${X_RE}\.${YZ_RE}\.${YZ_RE}$"
          if [[ $TAG =~ $FULL_RE ]]; then
            echo "Validation Passed: $TAG"
          else
            echo "::error title=Invalid Tag::Tag '$TAG' does not match format vX.Y.Z (X:0-255, Y/Z:0-65535)"
            exit 1
          fi

  static-code-analysis:
    name: Static code analysis
    needs: input-check
    uses: ./.github/workflows/static-code-analysis.yml

  android-lint:
    name: Android lint
    needs: input-check
    uses: ./.github/workflows/lint.yml

  conveyor-build:
    needs: [ input-check, static-code-analysis, android-lint ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create local tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.input-check.outputs.validated_tag }}" "$GITHUB_SHA"
      - name: Setup JDK and Gradle
        uses: ./.github/actions/setup-java-gradle
      - name: Build jar
        run: ./gradlew :pdf:desktopApp:jvmJar
      - name: Run Conveyor
        uses: hydraulic-software/conveyor/actions/build@v22.0
        env:
          OAUTH_TOKEN: ${{ secrets.OAUTH_TOKEN }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          CONVEYOR_PASSPHRASE: ${{ secrets.CONVEYOR_PASSPHRASE  }}
        with:
          command: -f ci.conveyor.conf make site
          extra_flags: '--passphrase=env:CONVEYOR_PASSPHRASE'
          signing_key: ${{ secrets.SIGNING_KEY }}
          agree_to_license: 1
      - name: Prepare gh-pages source bundle
        run: |
          set -euo pipefail
          mkdir gh-pages-source
          cp -r docs/. gh-pages-source/
          mv output/download.html gh-pages-source/
          mv output/icon.png gh-pages-source/
          tar -cvf gh-pages-source.tar gh-pages-source/
      - name: Upload conveyor artifact
        uses: actions/upload-artifact@v7
        with:
          name: gh-pages-source
          path: gh-pages-source.tar
      - name: Upload conveyor artifact
        uses: actions/upload-artifact@v7
        with:
          name: conveyor-output
          path: output/*

  draft-release:
    needs: [ input-check, conveyor-build ]
    runs-on: ubuntu-latest
    steps:
      - name: Update draft release metadata
        uses: release-drafter/release-drafter@563bf132657a13ded0b01fcb723c5a58cdd824e2 # 7.2.1
        with:
          config-name: release-drafter.yml
          tag: ${{ needs.input-check.outputs.validated_tag }}
      - name: Download Desktop artifacts
        uses: actions/download-artifact@v6
        with:
          name: conveyor-output
          path: release-assets
      - name: Download gh-pages source artifact
        uses: actions/download-artifact@v6
        with:
          name: gh-pages-source
          path: release-assets
      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ needs.input-check.outputs.validated_tag }}
          draft: true
          files: release-assets/*
          overwrite_files: true

  create-release:
    needs: [ input-check, draft-release ]
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release and tag
        uses: release-drafter/release-drafter@563bf132657a13ded0b01fcb723c5a58cdd824e2 # 7.2.1
        with:
          config-name: release-drafter.yml
          publish: true
          tag: ${{ needs.input-check.outputs.validated_tag }}
          token: ${{ secrets.RELEASE_DRAFTER_PUBLISH }}
