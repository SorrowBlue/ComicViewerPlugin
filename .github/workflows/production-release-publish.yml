name: Production Release Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: production-release-publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:

  build-android-release:
    uses: SorrowBlue/github-actions/.github/workflows/android-publish.yml@main
    secrets: inherit
    with:
      environment: android-release
      fetch-depth: 0
      task: :pdf:androidApp:bundleRelease
      package-name: com.sorrowblue.comicviewer.plugin.pdf
      release-files: pdf/androidApp/build/outputs/bundle/release/androidApp-release.aab
      tracks: production
      status: draft
      mapping-file: pdf/androidApp/build/outputs/mapping/release/mapping.txt
      debug-symbols: pdf/androidApp/build/intermediates/merged_native_libs/release/mergeReleaseNativeLibs/out/lib

  build-gh-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Download _site.tar from this tag release
        uses: robinraju/release-downloader@28fc21f50d76778e7023361aa1f863e717d3d56f # v1.13
        with:
          tag: ${{ github.ref_name }}
          fileName: 'gh-pages-source.tar'
          extract: true
      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1.0.13
        with:
          source: ./gh-pages-source
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0

  deplay-gh-pages:
    needs: build-gh-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
