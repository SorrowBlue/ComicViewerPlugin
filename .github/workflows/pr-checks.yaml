name: PR Checks

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    types: [ opened, reopened, synchronize ]
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: read
  pull-requests: write
  security-events: write

jobs:
  check-commit:
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.should-run }}
    steps:
      - name: Check if should run
        id: check
        run: |
          if [ "${{ github.event_name }}" = "push" ] && \
             [ "${{ github.event.head_commit.committer.name }}" = "GitHub" ]; then
            echo "should-run=false" >> $GITHUB_OUTPUT
            echo "Skipping workflow for PR commit to main"
          else
            echo "should-run=true" >> $GITHUB_OUTPUT
            echo "Running workflow"
          fi

  lint:
    needs: check-commit
    if: needs.check-commit.outputs.should-run == 'true'
    uses: SorrowBlue/github-actions/.github/workflows/analyze-matrix.yml@main
    with:
      matrix-json: .github/lint-matrix.json

  build:
    needs: [ check-commit, lint ]
    if: needs.check-commit.outputs.should-run == 'true'
    uses: ./.github/workflows/build.yml
    secrets: inherit

  allchecks:
    name: All Checks Passed
    needs: build
    if: needs.check-commit.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: wechuli/allcheckspassed@1d00cf0c34c4b0805db8866d8913f22e7125301e # v2
        with:
          poll: false
          delay: 0
