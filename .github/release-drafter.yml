name-template: "v$RESOLVED_VERSION 🌈"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "fix"
      - "bugfix"
      - "bug"
  - title: "🧰 Maintenance"
    label: "chore"
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&' # You can add # and @ to disable mentions, and add ` to disable code blocks.
version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
  patch:
    labels:
      - "patch"
  default: patch
template: |

  [Download](https://SorrowBlue.github.io/ComicViewerPlugin/download.html)

  ## What’s Changed

  $CHANGES


autolabeler:
  - label: 'type: :sparkles:feature'
    branch:
      - '/^feature[/].+/'
  - label: 'type: :rocket:enhancement'
    branch:
      - '/^enhancement[/].+/'
  - label: 'type: :recycle:refactor'
    branch:
      - '/^refactor[/-].+/'
  - label: 'type: :bug:bug'
    branch:
      - '/^fix[/].+/'
  - label: 'type: :memo:documentation'
    branch:
      - '/^doc[/-].+/'
    files:
      - '*.md'
  - label: 'type: :dependabot:dependencies'
    branch:
      - '/dependencies[/-].+/'
      - '/renovate[/-].+/'
  - label: 'type: :gear:chore'
    branch:
      - '/^chore[/-].+/'
